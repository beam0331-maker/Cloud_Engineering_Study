name: Velog Auto Backup

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write # 권한 부족으로 인한 exit code 1 방지

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 최신 버전으로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 버전으로 업데이트
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run backup script
        run: python Velog_Backup/velog_backup.py # 파일 위치가 루트인지 확인 필수!

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 변경사항이 있을 때만 커밋 수행
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update Velog posts"
            git push
          else
            echo "No changes to commit"
          fi
